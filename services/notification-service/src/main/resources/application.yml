server:
  port: ${SERVER_PORT:9091}

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/ocadyn}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SMTP_SSL:false}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

ocadyn:
  jwt:
    secret: ${JWT_SECRET:ocadyn-dev-secret-key-change-me-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4321,http://localhost:3000}
  internal-api:
    key: ${INTERNAL_API_KEY:ocadyn-internal-dev-key}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:${OCADYN_MAIL_FROM:}}
    host: ${MAIL_HOST:}
    username: ${MAIL_USER:}
  app:
    url: ${APP_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ocadyn: INFO
