server:
  port: ${SERVER_PORT:9093}

spring:
  application:
    name: scraper-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

ocadyn:
  jwt:
    secret: ${JWT_SECRET:ocadyn-dev-secret-key-change-me-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4321,http://localhost:3000}
  internal-api:
    key: ${INTERNAL_API_KEY:ocadyn-internal-dev-key}
  tracker:
    base-url: ${TRACKER_SERVICE_URL:http://localhost:9092}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:9091}
  price-check:
    delay-ms: ${PRICE_CHECK_DELAY_MS:300000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ocadyn: INFO
